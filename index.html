<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TAKRAR • Real Physics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500&display=swap');
body { margin:0; min-height:100vh; min-height:100dvh; overflow:hidden; background:#05050a; font-family:'Inter',sans-serif; color:#fff; }
#canvas { position:absolute; top:0; left:0; width:100%; height:100%; touch-action:none; }

.overlay { 
  position:absolute; top:0; left:0; width:100%; height:100%; 
  pointer-events:none; z-index:10; 
}

.title {
  position:absolute; top:30px; left:50%; transform:translateX(-50%);
  font-family:'Space Grotesk',sans-serif; font-size:38px; letter-spacing:-2px;
  background:linear-gradient(90deg,#00ffcc,#ff00ff); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; pointer-events:none;
}

.controls {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 15, 30, 0.85);
  padding: 18px 28px;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  pointer-events: all;
  min-width: 380px;
  border: 1px solid rgba(0, 255, 200, 0.2);
}

.mode-toggle {
  display: flex;
  background: rgba(0,0,0,0.4);
  border-radius: 9999px;
  padding: 4px;
  width: fit-content;
}

.mode-btn {
  padding: 8px 24px;
  border: none;
  border-radius: 9999px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.mode-btn.active {
  background: #00ffcc;
  color: #000;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
}

.slider-label {
  font-size: 13px;
  opacity: 0.8;
  white-space: nowrap;
}

#freqSlider {
  flex: 1;
  accent-color: #00ffcc;
}

#freqValue {
  font-family: monospace;
  font-size: 15px;
  min-width: 92px;
  text-align: right;
  color: #00ffcc;
}

.input-group {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
}

#freqInput {
  flex: 1;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(0,255,200,0.4);
  color: #fff;
  padding: 10px 14px;
  border-radius: 12px;
  font-family: monospace;
  font-size: 16px;
  outline: none;
}

#freqInput:focus {
  border-color: #00ffcc;
  box-shadow: 0 0 0 3px rgba(0,255,200,0.2);
}

#setFreqBtn {
  background: #00ffcc;
  color: #000;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.2s;
}

#setFreqBtn:hover {
  background: #00ffaa;
  transform: scale(1.05);
}

.mic-btn {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
  background:rgba(0,255,200,0.95); color:#000; border:none; padding:16px 48px;
  border-radius:9999px; font-size:17px; font-weight:700; cursor:pointer;
  box-shadow:0 0 50px #00ffcc; transition:all .3s; pointer-events:all;
}
.mic-btn:hover { transform:translateX(-50%) scale(1.08); }
.mic-btn.listening { animation:pulse 1.8s infinite; }

.info { 
  position:absolute; bottom:25px; left:50%; transform:translateX(-50%); 
  font-size:13px; opacity:0.6; text-align:center; 
}

@keyframes pulse { 50% { box-shadow:0 0 30px #00ffcc; } }

#controlsToggleBtn {
  display: none;
  position: absolute;
  top: 78px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 12;
  background: rgba(10, 15, 30, 0.88);
  color: #fff;
  border: 1px solid rgba(0, 255, 200, 0.2);
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  pointer-events: all;
}

@media (max-width: 640px) {
  #controlsToggleBtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    top: max(60px, calc(env(safe-area-inset-top) + 50px));
  }

  .title {
    top: max(18px, calc(env(safe-area-inset-top) + 8px));
    font-size: 28px;
  }

  .controls {
    bottom: max(92px, calc(env(safe-area-inset-bottom) + 78px));
    width: min(calc(100vw - 24px), 360px);
    min-width: 0;
    padding: 14px;
  }

  .controls.mobile-collapsed {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(18px);
  }

  .mode-toggle,
  .slider-row,
  .input-group {
    width: 100%;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 12px;
  }

  .slider-row,
  .input-group {
    flex-wrap: wrap;
  }

  #freqValue,
  #setFreqBtn {
    width: 100%;
    min-width: 0;
  }

  .mic-btn {
    bottom: max(16px, env(safe-area-inset-bottom));
    width: min(calc(100vw - 24px), 320px);
    padding: 14px 18px;
  }

  .info {
    bottom: max(78px, calc(env(safe-area-inset-bottom) + 64px));
    width: calc(100vw - 24px);
  }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="overlay">
  <div class="title">TAKRAR</div>
  <button id="controlsToggleBtn" type="button">☰ Controls</button>

  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn active" id="micModeBtn">🎤 Microphone</button>
      <button class="mode-btn" id="manualModeBtn">🎛️ Manual</button>
    </div>

    <div class="slider-row">
      <span class="slider-label">Frequency</span>
      <input type="range" id="freqSlider" min="0" max="1000000" value="180" step="1">
      <span id="freqValue">180 Hz</span>
    </div>

    <div class="input-group">
      <input type="number" id="freqInput" placeholder="Enter frequency (0 - 1,000,000)" min="0" max="1000000">
      <button id="setFreqBtn">SET</button>
    </div>
  </div>

  <button class="mic-btn" id="micBtn">🎤 TAP TO LISTEN</button>
  <div class="info" id="infoText">Real frequency (0 Hz – 1 MHz) → Plate vibration → Particles self-organize</div>
</div>

<script>
// ============== REAL PHYSICS SETUP ==============
let scene, camera, renderer;
let plate, particles;
let audioContext, analyser, dataArray;
let isListening = false;
let isManualMode = false;
let lastTime = 0;
const particleCount = 9200;
let particleVel = new Float32Array(particleCount * 3);
let currentM = 2.0;
let currentN = 2.5;
let energySmoothed = 0;
let dominantFreq = 180;
let nodeAttraction = 0.0;

function chladni(x, y, m, n) {
  return Math.cos(m * x) * Math.cos(n * y) - Math.cos(n * x) * Math.cos(m * y);
}

async function init() {
  const canvas = document.getElementById("canvas");
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x05050a, 100, 450);
  camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(90, 110, 200);
  camera.lookAt(0, 15, 0);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  scene.add(new THREE.AmbientLight(0x112233, 1.8));
  const hemi = new THREE.HemisphereLight(0x00ffdd, 0xff22dd, 1.6);
  scene.add(hemi);

  // PLATE
  const plateGeo = new THREE.PlaneGeometry(230, 230, 140, 140);
  plateGeo.rotateX(-Math.PI / 2);
  const plateMat = new THREE.MeshPhongMaterial({
    color: 0x0a1f2a,
    emissive: 0x00ffcc,
    shininess: 50,
    transparent: true,
    opacity: 0.82,
    side: THREE.DoubleSide
  });
  plate = new THREE.Mesh(plateGeo, plateMat);
  scene.add(plate);

  // PARTICLES
  const pGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount * 3; i += 3) {
    positions[i] = (Math.random() - 0.5) * 205;
    positions[i+1] = 1.5 + Math.random() * 7;
    positions[i+2] = (Math.random() - 0.5) * 205;
    colors[i] = colors[i+1] = colors[i+2] = 1.0;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const pMat = new THREE.PointsMaterial({
    size: 2.1,
    vertexColors: true,
    transparent: true,
    opacity: 0.97,
    blending: THREE.AdditiveBlending
  });
  particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  // Orbit + pinch controls
  let isDragging = false, prevX = 0, prevY = 0, azimuth = Math.PI * 0.7, elevation = Math.PI * 0.42;
  let orbitRadius = 235;
  const activePointers = new Map();
  let pinchDistance = 0;
  function updateCamera() {
    camera.position.x = orbitRadius * Math.sin(elevation) * Math.sin(azimuth);
    camera.position.y = orbitRadius * Math.cos(elevation) + 30;
    camera.position.z = orbitRadius * Math.sin(elevation) * Math.cos(azimuth);
    camera.lookAt(0, 18, 0);
  }
  updateCamera();

  function setControlsCollapsed(collapsed) {
    const controls = document.querySelector('.controls');
    const toggleBtn = document.getElementById('controlsToggleBtn');
    const mobile = window.matchMedia('(max-width: 640px)').matches;
    controls.classList.toggle('mobile-collapsed', mobile && collapsed);
    toggleBtn.textContent = mobile && collapsed ? '☰ Tune' : '✕ Tune';
  }

  const controlsToggleBtn = document.getElementById('controlsToggleBtn');
  const infoText = document.getElementById('infoText');
  controlsToggleBtn.addEventListener('click', () => {
    document.querySelector('.controls').classList.toggle('mobile-collapsed');
    setControlsCollapsed(document.querySelector('.controls').classList.contains('mobile-collapsed'));
  });
  if (window.matchMedia('(max-width: 640px)').matches) setControlsCollapsed(true);
  if (window.matchMedia('(max-width: 640px)').matches) infoText.textContent = 'Drag to orbit the plate · pinch to zoom · open Tune when you need manual controls';

  function getPinchDistance() {
    const pts = [...activePointers.values()];
    if (pts.length < 2) return 0;
    return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
  }

  canvas.addEventListener('pointerdown', e => {
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (activePointers.size === 1) {
      isDragging = true;
      prevX = e.clientX;
      prevY = e.clientY;
    } else if (activePointers.size === 2) {
      isDragging = false;
      pinchDistance = getPinchDistance();
    }
    try { canvas.setPointerCapture(e.pointerId); } catch {}
  });
  window.addEventListener('pointerup', e => {
    activePointers.delete(e.pointerId);
    if (activePointers.size <= 1) pinchDistance = 0;
    if (activePointers.size === 1) {
      const remaining = [...activePointers.values()][0];
      prevX = remaining.x;
      prevY = remaining.y;
    }
    isDragging = activePointers.size === 1;
    if (e?.pointerId != null) {
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
    }
  });
  window.addEventListener('pointercancel', e => {
    activePointers.delete(e.pointerId);
    pinchDistance = 0;
    isDragging = false;
  });
  window.addEventListener('pointermove', e => {
    if (activePointers.has(e.pointerId)) activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (activePointers.size === 2) {
      const dist = getPinchDistance();
      if (pinchDistance) {
        orbitRadius = Math.max(150, Math.min(360, orbitRadius - (dist - pinchDistance) * 0.45));
        updateCamera();
      }
      pinchDistance = dist;
      return;
    }
    if (!isDragging) return;
    azimuth += (e.clientX - prevX) * 0.003;
    elevation = Math.max(0.2, Math.min(1.5, elevation - (e.clientY - prevY) * 0.003));
    prevX = e.clientX; prevY = e.clientY;
    updateCamera();
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    setControlsCollapsed(document.querySelector('.controls').classList.contains('mobile-collapsed'));
    infoText.textContent = window.matchMedia('(max-width: 640px)').matches
      ? 'Drag to orbit the plate · pinch to zoom · open Tune when you need manual controls'
      : 'Real frequency (0 Hz – 1 MHz) → Plate vibration → Particles self-organize';
  });

  // Mode buttons
  document.getElementById('micModeBtn').addEventListener('click', () => switchMode(false));
  document.getElementById('manualModeBtn').addEventListener('click', () => switchMode(true));

  // Slider
  const slider = document.getElementById('freqSlider');
  const freqValue = document.getElementById('freqValue');
  
  slider.addEventListener('input', () => {
    dominantFreq = parseFloat(slider.value);
    updateFreqDisplay();
  });

  // Input + Set button
  const freqInput = document.getElementById('freqInput');
  const setBtn = document.getElementById('setFreqBtn');

  setBtn.addEventListener('click', () => {
    let val = parseFloat(freqInput.value);
    if (isNaN(val)) {
      alert("Please enter a valid number");
      return;
    }
    val = Math.max(0, Math.min(1000000, val));   // clamp between 0 and 1M
    dominantFreq = val;
    slider.value = val;
    updateFreqDisplay();
    freqInput.value = '';   // clear input after setting
  });

  // Allow pressing Enter in input field
  freqInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') setBtn.click();
  });

  function updateFreqDisplay() {
    let displayStr;
    if (dominantFreq >= 1000000) {
      displayStr = (dominantFreq / 1000000).toFixed(2) + ' MHz';
    } else if (dominantFreq >= 1000) {
      displayStr = (dominantFreq / 1000).toFixed(1) + ' kHz';
    } else {
      displayStr = Math.round(dominantFreq) + ' Hz';
    }
    freqValue.textContent = displayStr;
  }

  // Initial display
  updateFreqDisplay();

  document.getElementById('micBtn').addEventListener('click', toggleListening);

  animate();
}

function switchMode(manual) {
  isManualMode = manual;
  
  const micBtn = document.getElementById('micModeBtn');
  const manualBtn = document.getElementById('manualModeBtn');
  const sliderContainer = document.getElementById('controls'); // not used directly
  const micControlBtn = document.getElementById('micBtn');

  if (manual) {
    micBtn.classList.remove('active');
    manualBtn.classList.add('active');
    document.querySelector('.controls').style.display = 'flex';
    setControlsCollapsed(false);
    micControlBtn.style.display = 'none';
    isListening = false;
  } else {
    micBtn.classList.add('active');
    manualBtn.classList.remove('active');
    micControlBtn.style.display = 'block';
    if (!window.matchMedia('(max-width: 640px)').matches) setControlsCollapsed(false);
  }
}

async function toggleListening() {
  const btn = document.getElementById('micBtn');
  if (isListening) {
    isListening = false;
    btn.textContent = '🎤 TAP TO LISTEN';
    btn.classList.remove('listening');
    nodeAttraction = 0;
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    isListening = true;
    btn.innerHTML = '🎤 <span style="color:#00ffcc">REAL VIBRATION ACTIVE</span>';
    btn.classList.add('listening');
  } catch(e) {
    alert("Microphone access needed.\n\nUse Manual mode + slider/input instead.");
  }
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 16, 5);
  lastTime = now;

  let currentEnergy = 35;

  if (isListening && analyser) {
    analyser.getByteFrequencyData(dataArray);
    let bass = 0, mid = 0, treble = 0;
    for (let i = 0; i < 32; i++) bass += dataArray[i];
    for (let i = 32; i < 128; i++) mid += dataArray[i];
    for (let i = 128; i < 256; i++) treble += dataArray[i];

    bass /= 32; mid /= 96; treble /= 128;
    const rawEnergy = (bass + mid + treble) / 3.4;

    let maxIndex = 0, maxVal = 0;
    for (let i = 6; i < dataArray.length * 0.7; i++) {
      if (dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIndex = i; }
    }

    const sampleRate = audioContext.sampleRate || 44100;
    dominantFreq = Math.max(0, maxIndex * (sampleRate / analyser.fftSize) * 0.92);

    energySmoothed = energySmoothed * 0.68 + rawEnergy * 0.32;
    currentEnergy = energySmoothed;
  } 
  else if (isManualMode) {
    energySmoothed = energySmoothed * 0.85 + 42 * 0.15;
    currentEnergy = energySmoothed;
  }

  // Redesigned Physics for 0–1MHz
  const freqForCalc = Math.max(dominantFreq, 5);
  const targetScale = Math.sqrt(freqForCalc / 28);
  const targetM = targetScale * 1.05;
  const targetN = targetScale * 1.18;

  currentM = currentM * 0.84 + targetM * 0.16;
  currentN = currentN * 0.84 + targetN * 0.16;

  const isSteady = currentEnergy > 16;
  if (isSteady) {
    nodeAttraction = Math.min(1.35, nodeAttraction + 0.012);
  } else {
    nodeAttraction = Math.max(0.0, nodeAttraction * 0.94);
  }

  // Plate vibration
  const positions = plate.geometry.attributes.position.array;
  const vibAmp = currentEnergy / 24 * (1 + nodeAttraction * 0.4);
  for (let i = 0; i < 141; i++) {
    for (let j = 0; j < 141; j++) {
      const idx = (i * 141 + j) * 3 + 1;
      const normX = (j - 70) / 70 * Math.PI * 1.08;
      const normY = (i - 70) / 70 * Math.PI * 1.08;
      const val = chladni(normX, normY, currentM, currentN);
      positions[idx] = val * vibAmp * 13.5;
    }
  }
  plate.geometry.attributes.position.needsUpdate = true;
  plate.geometry.computeVertexNormals();

  // Particles
  const pPos = particles.geometry.attributes.position.array;
  const pColors = particles.geometry.attributes.color.array;
  const vibScale = currentEnergy / 19;

  for (let i = 0; i < particleCount; i++) {
    const idx = i * 3;
    let px = pPos[idx];
    let pz = pPos[idx + 2];

    const normX = px / 112 * Math.PI;
    const normY = pz / 112 * Math.PI;
    const chVal = chladni(normX, normY, currentM, currentN);
    const vibration = Math.abs(chVal);

    let vx = particleVel[idx];
    let vz = particleVel[idx + 2];

    vx += (Math.random() - 0.5) * vibration * vibScale * 4.2;
    vz += (Math.random() - 0.5) * vibration * vibScale * 4.2;

    const pullStrength = nodeAttraction * (0.55 + vibration * 0.3);
    vx -= chVal * pullStrength * 2.4;
    vz -= chVal * pullStrength * 2.4;

    const damp = 0.86 - vibration * 0.08;
    vx *= damp;
    vz *= damp;

    px += vx * dt * 0.72;
    pz += vz * dt * 0.72;

    if (Math.abs(px) > 107) { px *= 0.48; vx *= -0.72; }
    if (Math.abs(pz) > 107) { pz *= 0.48; vz *= -0.72; }

    pPos[idx] = px;
    pPos[idx + 2] = pz;
    pPos[idx + 1] = 1.2 + Math.random() * 5.5 + Math.sin(now * 0.005 + i) * 2.8;

    particleVel[idx] = vx;
    particleVel[idx + 2] = vz;

    const settle = Math.max(0, 1 - vibration * 1.4);
    const brightness = 0.75 + settle * 0.9 * (currentEnergy / 70 + nodeAttraction * 0.6);
    pColors[idx] = pColors[idx+1] = pColors[idx+2] = Math.min(1.05, brightness);
  }

  particles.geometry.attributes.position.needsUpdate = true;
  particles.geometry.attributes.color.needsUpdate = true;

  renderer.render(scene, camera);
}

window.onload = init;
</script>
</body>
</html>
